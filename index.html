<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Флаги Бразилии</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    
    <div id="start-screen" class="screen">
        <h1>🇧🇷 Флаги штатов Бразилии</h1>
        <p>Проверьте свои знания и узнайте историю символики каждого региона.</p>
        <button class="primary-btn" onclick="startGame()">Начать квиз</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="progress">Вопрос <span id="current-q-num">1</span> из <span id="total-q-num">10</span></div>
        <h2 id="question-text">Какому штату принадлежит этот флаг?</h2>
        
        <div class="flag-container">
            <img id="flag-image" src="" alt="Флаг">
        </div>

        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="context-screen" class="screen hidden">
        <div id="result-badge" class="badge"></div>
        <h2 id="context-city-name">Название штата</h2>
        
        <div class="info-card">
            <h3>📖 История</h3>
            <p id="context-history"></p>
        </div>

        <div class="info-card">
            <h3>🛡️ Символика</h3>
            <p id="context-symbolism"></p>
        </div>

        <button class="primary-btn" onclick="nextQuestion()">Продолжить ➔</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h2>Квиз завершен!</h2>
        <p>Вы ответили правильно на <span id="score-display">0</span> из <span id="total-score-display">0</span> вопросов.</p>
        <button class="primary-btn" onclick="location.reload()">Пройти еще раз</button>
    </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
