            <h2 id="start-info-text" data-i18n="uid_start_instruction"></h2>
            <button id="start-btn" class="primary-btn" data-i18n="uid_start_btn" onclick="startGame()"></button>
        </div>

    <div id="state-selection-screen" class="screen hidden">
        <h2 data-i18n="uid_select_state_title"></h2>
        <p style="margin-bottom: 20px; color: #666;" data-i18n="uid_select_state_desc"></p>
        <div class="states-grid" id="states-container"></div>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="progress">
            <span data-i18n="uid_question_prefix"></span> <span id="current-q-num">1</span> 
            <span data-i18n="uid_question_separator"></span> <span id="total-q-num">10</span>
        </div>
        <h2 id="question-text" data-i18n="uid_question_text"></h2>

        <div class="flag-container">
            <div class="zoom-container" id="quiz-flag-zoom-container">
                <img id="flag-image" src="" alt="Flag">
                <div id="quiz-zoom-lens" class="lens"></div>
            </div>
        </div>

        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="context-screen" class="screen hidden">
        <div id="result-badge" class="badge"></div>
        <h2 id="context-city-name" style="text-align: center; width: 100%; margin-bottom: 20px;"></h2>
        
        <div class="context-grid-3col">
            
            <div class="panel-left">
                <div id="city-map"></div>
            </div>
            
            <div class="panel-center">
                <div class="zoom-container" id="flag-zoom-container">
                    <img id="context-flag-image" src="" alt="Flag">
                    <div id="zoom-lens" class="lens"></div> 
                </div>
            </div>
            
            <div class="panel-right">
                <div class="info-card">
                    <h3 data-i18n="uid_symbolism_title"></h3>
                    <p id="context-symbolism"></p>
                </div>
                <div class="info-card" id="motto-container">
                    <h3 data-i18n="uid_motto_title"></h3>
                    <p id="context-motto"></p>
                </div>
            </div>

        </div>

        <div style="text-align: center; width: 100%; margin-top: 20px;">
            <button class="primary-btn" data-i18n="uid_continue_btn" onclick="nextQuestion()"></button>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <h2 data-i18n="uid_finish_title"></h2>
        <p style="font-size: 1.2rem; margin: 20px 0;">
            <span data-i18n="uid_result_text_1"></span> 
            <strong id="score-display">0</strong> 
            <span data-i18n="uid_result_text_2"></span> <strong id="total-score-display">10</strong>
        </p>
        
        <button class="primary-btn" data-i18n="uid_restart_btn" onclick="startGame()"></button>
    </div>
